version: "3.8"

services:
  app:
    build: ./app
    image: ${DOCKERHUB_USERNAME:-local}/todo-app:latest
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=tasks
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - web

  db:
    image: postgres:14
    environment:
      - POSTGRES_DB=tasks
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - web

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "yes"]
    restart: unless-stopped
    networks:
      - web

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - web

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - web

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - cadvisor
    restart: unless-stopped
    networks:
      - web

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - web

volumes:
  db-data:
  prometheus-data:

networks:
  web:
    driver: bridge
